{% extends "base.html" %}
{% block title %}Edit Employee{% endblock %}
{% block heading %}Edit Employee{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST" action="{{ url_for('employees.edit', id=employee.id) }}" class="app-form">
        <div class="form-row">
            <div class="form-group">
                <label for="employee_code">Employee Code <span class="required">*</span></label>
                <input type="text" id="employee_code" name="employee_code" value="{{ employee.employee_code }}" required>
            </div>
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" value="{{ employee.name }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" value="{{ employee.email }}" required>
            </div>
            <div class="form-group">
                <label for="department">Department <span class="required">*</span></label>
                <input type="text" id="department" name="department" value="{{ employee.department }}" required>
            </div>
        </div>
        <div class="form-group">
            <label for="designation">Designation</label>
            <input type="text" id="designation" name="designation" value="{{ employee.designation or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Employee</button>
            <a href="{{ url_for('employees.list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Add Employee{% endblock %}
{% block heading %}Add Employee{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST" action="{{ url_for('employees.add') }}" class="app-form" id="employee-form">
        <div class="form-row">
            <div class="form-group">
                <label for="employee_code">Employee Code <span class="required">*</span></label>
                <input type="text" id="employee_code" name="employee_code" value="{{ form.get('employee_code', '') if form else '' }}" placeholder="e.g. EMP004" required>
            </div>
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" value="{{ form.get('name', '') if form else '' }}" placeholder="Enter full name" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" value="{{ form.get('email', '') if form else '' }}" placeholder="Enter email address" required>
            </div>
            <div class="form-group">
                <label for="department">Department <span class="required">*</span></label>
                <input type="text" id="department" name="department" value="{{ form.get('department', '') if form else '' }}" placeholder="e.g. IT, HR, Finance" required>
            </div>
        </div>
        <div class="form-group">
            <label for="designation">Designation</label>
            <input type="text" id="designation" name="designation" value="{{ form.get('designation', '') if form else '' }}" placeholder="e.g. Software Developer">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Employee</button>
            <a href="{{ url_for('employees.list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

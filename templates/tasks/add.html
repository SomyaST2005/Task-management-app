{% extends "base.html" %}
{% block title %}Create Task{% endblock %}
{% block heading %}Create Task{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST" action="{{ url_for('tasks.add') }}" class="app-form" id="task-form">
        <div class="form-group">
            <label for="task_title">Task Title <span class="required">*</span></label>
            <input type="text" id="task_title" name="task_title" value="{{ form.get('task_title', '') if form else '' }}" placeholder="Enter task title" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="employee_id">Assign To Employee <span class="required">*</span></label>
                <select id="employee_id" name="employee_id" required>
                    <option value="">-- Select Employee --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}" {{ 'selected' if form and form.get('employee_id','') == emp.id|string }}>{{ emp.name }} ({{ emp.employee_code }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="Medium" {{ 'selected' if not form or form.get('priority','Medium') == 'Medium' }}>Medium</option>
                    <option value="Low" {{ 'selected' if form and form.get('priority') == 'Low' }}>Low</option>
                    <option value="High" {{ 'selected' if form and form.get('priority') == 'High' }}>High</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Enter task description...">{{ form.get('description', '') if form }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="Pending" {{ 'selected' if not form or form.get('status','Pending') == 'Pending' }}>Pending</option>
                    <option value="In Progress" {{ 'selected' if form and form.get('status') == 'In Progress' }}>In Progress</option>
                    <option value="Completed" {{ 'selected' if form and form.get('status') == 'Completed' }}>Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="completed">Completed</label>
                <select id="completed" name="completed">
                    <option value="False" {{ 'selected' if not form or form.get('completed','False') == 'False' }}>False</option>
                    <option value="True" {{ 'selected' if form and form.get('completed') == 'True' }}>True</option>
                </select>
            </div>
            <div class="form-group">
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date" value="{{ form.get('due_date', '') if form }}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Task</button>
            <a href="{{ url_for('tasks.list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

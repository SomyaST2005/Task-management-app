{% extends "base.html" %}
{% block title %}Edit Task{% endblock %}
{% block heading %}Edit Task #{{ task.id }}{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST" action="{{ url_for('tasks.edit', id=task.id) }}" class="app-form" id="task-form">
        <div class="form-group">
            <label for="task_title">Task Title <span class="required">*</span></label>
            <input type="text" id="task_title" name="task_title" value="{{ task.task_title }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="employee_id">Assign To Employee <span class="required">*</span></label>
                <select id="employee_id" name="employee_id" required>
                    <option value="">-- Select Employee --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}" {{ 'selected' if task.employee_id == emp.id }}>{{ emp.name }} ({{ emp.employee_code }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="Low" {{ 'selected' if task.priority == 'Low' }}>Low</option>
                    <option value="Medium" {{ 'selected' if task.priority == 'Medium' }}>Medium</option>
                    <option value="High" {{ 'selected' if task.priority == 'High' }}>High</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ task.description or '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="Pending" {{ 'selected' if task.status == 'Pending' }}>Pending</option>
                    <option value="In Progress" {{ 'selected' if task.status == 'In Progress' }}>In Progress</option>
                    <option value="Completed" {{ 'selected' if task.status == 'Completed' }}>Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="completed">Completed</label>
                <select id="completed" name="completed">
                    <option value="False" {{ 'selected' if not task.completed }}>False</option>
                    <option value="True" {{ 'selected' if task.completed }}>True</option>
                </select>
            </div>
            <div class="form-group">
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date" value="{{ task.due_date or '' }}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Task</button>
            <a href="{{ url_for('tasks.list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
